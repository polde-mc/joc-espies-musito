<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joc d'espies Musito</title>
  <style>
    :root {
      --bg: #0f1221;
      --panel: #171b31;
      --panel-2: #1f2645;
      --panel-3: #232b51;
      --text: #f2f4ff;
      --muted: #b3bbdf;
      --accent: #8ea2ff;
      --accent-2: #c4ceff;
      --confirm: #64c7b0;
      --confirm-text: #102821;
      --danger: #ff8d8d;
      --shadow: 0 10px 30px rgba(0,0,0,0.25);
      --radius: 20px;
      --radius-input: 14px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #0d1020 0%, #131934 100%);
      color: var(--text);
      min-height: 100vh;
    }

    button, input {
      font: inherit;
    }

    button {
      border: 1px solid rgba(255,255,255,0.12);
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.2s ease, background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }

    button:hover { opacity: 0.97; }
    button:active { transform: translateY(1px); }
    button:disabled { cursor: not-allowed; transform: none; }

    .hidden { display: none !important; }

    .app {
      width: min(100%, 820px);
      margin: 0 auto;
      padding: 18px;
      display: grid;
      gap: 14px;
      min-height: 100vh;
    }

    .header-plain {
      padding: 0 0 8px;
    }

    h1, h2, h3, p { margin-top: 0; }

    h1 {
      font-size: 3.2rem;
      margin: 0;
      text-align: center;
      line-height: 1.02;
      padding: 18px 0 10px;
    }

    h2 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    .muted { color: var(--muted); }
    .small { font-size: 0.92rem; }

    .card {
      background: rgba(23,27,49,0.94);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 18px;
      backdrop-filter: blur(10px);
    }

    .stack {
      display: grid;
      gap: 14px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.12);
      outline: none;
    }

    input::placeholder {
      color: rgba(242,244,255,0.5);
    }

    .config-screen {
      min-height: 460px;
    }

    .segmented-bar {
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 0;
      overflow: hidden;
      width: 100%;
    }

    .segment-btn {
      min-height: 44px;
      padding: 0;
      border: none;
      border-right: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      color: var(--muted);
      border-radius: 0;
      font-weight: 600;
    }

    .segment-btn:last-child { border-right: none; }
    .segment-btn.active {
      background: var(--confirm);
      color: var(--confirm-text);
    }

    .player-inputs {
      display: grid;
      gap: 10px;
    }

    .player-input-row { display: block; }

    .action-button {
      background: #2b304a;
      color: #7f86a8;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: none;
      font-weight: 700;
      padding: 12px 16px;
    }

    .action-button.enabled {
      background: var(--confirm);
      color: var(--confirm-text);
      border-color: rgba(255,255,255,0.08);
    }

    .action-button:disabled {
      opacity: 1;
      background: #2b304a;
      color: #7f86a8;
      border-color: rgba(255,255,255,0.06);
    }

    .secondary {
      background: var(--panel-2);
      color: var(--text);
      border-radius: var(--radius-input);
      padding: 12px 16px;
      font-weight: 700;
    }

    .ghost {
      background: transparent;
      color: var(--accent-2);
      border: 1px dashed rgba(255,255,255,0.16);
      border-radius: var(--radius-input);
      padding: 12px 16px;
      font-weight: 700;
    }

    .round-button {
      border-radius: var(--radius-input);
    }

    .square-button {
      border-radius: 0;
    }

    .compact-button {
      width: 40%;
      min-width: 220px;
      justify-self: center;
    }

    .footer-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .packages-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .package-card {
      border-radius: 18px;
      padding: 14px;
      display: grid;
      gap: 12px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.08);
      transition: transform 0.08s ease, background 0.2s ease, border-color 0.2s ease, filter 0.2s ease;
      min-height: 118px;
    }

    .package-card.selected {
      filter: saturate(1.08) brightness(1.05);
      border-color: rgba(255,255,255,0.16);
      box-shadow: none;
    }

    .package-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .package-title {
      font-size: 1.06rem;
      font-weight: 700;
    }

    .eye-btn {
      min-width: 42px;
      width: 42px;
      height: 42px;
      border-radius: 12px;
      padding: 0;
      display: grid;
      place-items: center;
      background: rgba(17, 23, 43, 0.45);
      color: var(--accent-2);
      border: 1px solid rgba(255,255,255,0.12);
      flex-shrink: 0;
    }

    .summary-box {
      background: rgba(255,255,255,0.04);
      border-radius: 18px;
      padding: 14px;
      border: 1px solid rgba(255,255,255,0.07);
      display: grid;
      gap: 12px;
    }

    .summary-section {
      display: grid;
      gap: 8px;
    }

    .plain-list {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 0.96rem;
    }

    .player-reveal-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      align-content: start;
    }

    .player-reveal-btn {
      min-height: 58px;
      border-radius: 16px;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.08);
      font-weight: 700;
      padding: 12px;
    }

    .player-reveal-btn.done {
      background: rgba(255,255,255,0.04);
      color: rgba(242,244,255,0.42);
      border-color: rgba(255,255,255,0.05);
      box-shadow: none;
    }

    .player-reveal-btn.pending {
      background: linear-gradient(180deg, rgba(35,43,81,0.95), rgba(31,38,69,0.95));
    }

    .round-layout {
      min-height: 62vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 16px;
    }

    .timer-block {
      display: grid;
      justify-items: center;
      gap: 14px;
      padding-top: 8px;
    }

    .timer {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-align: center;
      line-height: 1;
    }

    .timer-toggle {
      width: min(100%, 240px);
      border-radius: 0;
    }

    .round-bottom-actions {
      display: grid;
      justify-items: center;
      gap: 10px;
    }

    .reveal-box {
      width: 80%;
      max-width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      color: var(--muted);
      border: 1px solid rgba(255,255,255,0.06);
      text-align: center;
    }

    .bottom-ghost {
      width: 80%;
    }

    .bottom-primary {
      width: 100%;
    }

    .time-picker-wrap {
      position: relative;
    }

    .time-panel {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: stretch;
      background: var(--panel-2);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-input);
      padding: 0;
      overflow: hidden;
    }

    .time-display {
      display: flex;
      align-items: center;
      padding: 12px 14px;
      color: var(--text);
      min-height: 50px;
    }

    .time-open-btn {
      width: 50px;
      min-width: 50px;
      margin: 4px 4px 4px 0;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      color: var(--accent-2);
      display: grid;
      place-items: center;
      font-weight: 800;
    }

    .time-menu {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 8px);
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
      z-index: 12;
    }

    .time-option {
      width: 100%;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: transparent;
      color: var(--text);
      text-align: left;
      padding: 12px 14px;
      border-radius: 0;
      font-weight: 600;
    }

    .time-option:last-child { border-bottom: none; }
    .time-option.active {
      background: rgba(100,199,176,0.15);
      color: #bff1e4;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(6, 9, 20, 0.72);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 30;
    }

    .modal {
      width: min(100%, 560px);
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      padding: 18px;
      box-shadow: var(--shadow);
      position: relative;
    }

    .modal.stack {
      display: grid;
      gap: 14px;
    }

    .square-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .square-choice {
      min-height: 64px;
      font-size: 1.1rem;
      border-radius: 0;
      background: var(--panel-2);
      color: var(--text);
      font-weight: 700;
    }

    .square-choice.active {
      background: var(--confirm);
      color: var(--confirm-text);
    }

    .scenario-list {
      display: grid;
      gap: 8px;
      max-height: 52vh;
      overflow: auto;
    }

    .scenario-expand-item {
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.04);
    }

    .scenario-expand-head {
      width: 100%;
      background: transparent;
      color: var(--text);
      border: none;
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      text-align: left;
      border-radius: 0;
      font-weight: 700;
    }

    .scenario-expand-roles {
      background: rgba(196,206,255,0.12);
      padding: 12px 14px;
      display: grid;
      gap: 6px;
      color: #e0e6ff;
      font-size: 0.96rem;
    }

    .player-role-modal {
      width: min(100%, 760px);
      min-height: min(34vh, 340px);
      max-height: min(42vh, 420px);
      padding: 22px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
    }

    .player-role-close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: rgba(201,91,91,0.18);
      color: var(--danger);
      border: 1px solid rgba(255,141,141,0.32);
      font-size: 1.1rem;
      font-weight: 900;
    }

    .player-role-content {
      display: grid;
      place-items: center;
      text-align: center;
      gap: 12px;
      padding: 18px 12px;
      min-height: 100%;
    }

    .scenario-big {
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      line-height: 1.1;
      font-weight: 800;
    }

    .role-line {
      font-size: clamp(1.1rem, 3vw, 1.35rem);
      color: var(--accent-2);
      font-weight: 600;
    }

    .spy-big {
      font-size: clamp(2rem, 7vw, 3.2rem);
      line-height: 1;
      font-weight: 900;
      color: #ffb4b4;
      letter-spacing: 0.04em;
    }

    .screen-title-block p { display: none; }

    @media (max-width: 760px) {
      .segmented-bar {
        overflow-x: auto;
        grid-template-columns: repeat(8, minmax(64px, 1fr));
      }
    }

    @media (max-width: 640px) {
      .packages-grid,
      .footer-actions,
      .player-reveal-grid {
        grid-template-columns: 1fr;
      }

      h1 { font-size: 2.5rem; }
      h2 { font-size: 1.7rem; }

      .compact-button {
        width: 100%;
        min-width: 0;
      }

      .reveal-box,
      .bottom-ghost {
        width: 100%;
      }

      .timer-toggle {
        width: min(100%, 220px);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="header-plain">
      <h1>Joc d'espies Musito</h1>
    </section>

    <section id="setupScreen" class="card stack config-screen">
      <div id="configPage1" class="stack">
        <div>
          <h2>Jugadors</h2>
        </div>

        <div class="segmented-bar" id="playerCountButtons"></div>

        <div class="player-inputs" id="playerInputs"></div>
        <button id="addExtraPlayerBtn" class="ghost hidden round-button">Afegir un altre jugador</button>

        <button id="spyPickerBtn" class="action-button square-button compact-button">Seleccionar nombre d'espies</button>

        <button id="toPage2Btn" class="action-button round-button" disabled>Següent</button>
      </div>

      <div id="configPage2" class="stack hidden">
        <div>
          <h2>Paquets</h2>
          <p class="muted small">Selecciona un paquet amb situacions per jugar. Només es pot escollir un.</p>
        </div>

        <div class="packages-grid" id="packagesGrid"></div>

        <div class="footer-actions">
          <button id="backToPage1Btn" class="secondary round-button">Enrere</button>
          <button id="toPage3Btn" class="action-button round-button" disabled>Següent</button>
        </div>
      </div>

      <div id="configPage3" class="stack hidden">
        <div>
          <h2>Resum de la partida</h2>
        </div>

        <div class="summary-box" id="summaryBox"></div>

        <div class="stack">
          <div>
            <h3>Durada de la ronda</h3>
          </div>
          <div class="time-picker-wrap" id="timePickerWrap">
            <div class="time-panel">
              <div class="time-display" id="timeDisplay">8 minuts</div>
              <button id="timeMenuToggle" class="time-open-btn" type="button" aria-label="Obrir selector de temps">▾</button>
            </div>
            <div id="timeMenu" class="time-menu hidden"></div>
          </div>
        </div>

        <div class="footer-actions">
          <button id="backToPage2Btn" class="secondary round-button">Enrere</button>
          <button id="startGameBtn" class="action-button round-button enabled">Començar partida</button>
        </div>
      </div>
    </section>

    <section id="revealScreen" class="card stack hidden">
      <div class="screen-title-block">
        <h2>Repartiment de rols</h2>
      </div>

      <div class="player-reveal-grid" id="playerRevealGrid"></div>

      <button id="revealReadyBtn" class="action-button round-button" disabled>Començar</button>
    </section>

    <section id="roundScreen" class="card hidden">
      <div class="round-layout">
        <div class="timer-block">
          <h2>Partida en marxa</h2>
          <div class="timer" id="timerDisplay">08:00</div>
          <button id="timerToggleBtn" class="secondary timer-toggle square-button">Pausar</button>
        </div>

        <div class="round-bottom-actions">
          <div id="sceneRevealBox" class="reveal-box hidden"></div>
          <button id="revealSceneBtn" class="ghost bottom-ghost">Revelar escenari</button>
          <button id="backToSetupBtn" class="ghost bottom-ghost">Tornar a configuració</button>
          <button id="newRoundBtn" class="action-button round-button enabled bottom-primary">Nova ronda</button>
        </div>
      </div>
    </section>
  </div>

  <div id="spyModalBackdrop" class="modal-backdrop hidden">
    <div class="modal stack">
      <div>
        <h2>Escull el nombre d'espies</h2>
      </div>
      <div class="square-grid" id="spyGrid"></div>
      <button id="closeSpyModalBtn" class="action-button square-button" disabled>Confirmar</button>
    </div>
  </div>

  <div id="scenariosModalBackdrop" class="modal-backdrop hidden">
    <div class="modal stack">
      <div>
        <h2 id="scenariosModalTitle">Situacions del paquet</h2>
      </div>
      <div class="scenario-list" id="scenariosModalList"></div>
      <button id="closeScenariosModalBtn" class="secondary round-button">Tancar</button>
    </div>
  </div>

  <div id="playerRoleModalBackdrop" class="modal-backdrop hidden">
    <div class="modal player-role-modal" id="playerRoleModal">
      <button id="closePlayerRoleBtn" class="player-role-close" type="button" aria-label="Tancar">✕</button>
      <div id="playerRoleContent" class="player-role-content"></div>
    </div>
  </div>

  <script>
    const ALL_SCENARIOS = [
      { id: 'aeroport', nom: 'Aeroport', rols: ['Pilot', 'Hostessa', 'Passatger', 'Controlador', 'Policia', 'Treballador de pista', 'Seguretat', 'Personal de botiga'] },
      { id: 'hospital', nom: 'Hospital', rols: ['Metge', 'Infermera', 'Pacient', 'Recepcionista', 'Cirurgià', 'Camiller', 'Visitant', 'Neteja'] },
      { id: 'discoteca', nom: 'Discoteca', rols: ['DJ', 'Cambrer', 'Porter', 'Client', 'Segurata', 'Fotògraf', 'Neteja', 'Promotor'] },
      { id: 'institut', nom: 'Institut', rols: ['Professor', 'Alumne', 'Director', 'Conserge', 'Tutor', 'Orientador', 'Neteja', 'Monitor'] },
      { id: 'restaurant', nom: 'Restaurant', rols: ['Cuiner', 'Cambrer', 'Client', 'Xef', 'Encarregat', 'Repartidor', 'Rentaplats', 'Sommelier'] },
      { id: 'camping', nom: 'Càmping', rols: ['Recepcionista', 'Campista', 'Monitor', 'Socorrista', 'Neteja', 'Animador', 'Veí de parcel·la', 'Manteniment'] },
      { id: 'tren', nom: 'Tren', rols: ['Maquinista', 'Revisor', 'Passatger', 'Turista', 'Policia', 'Neteja', 'Interventor', 'Venedor ambulant'] },
      { id: 'platja', nom: 'Platja', rols: ['Socorrista', 'Banyista', 'Venedor', 'Surfista', 'Neteja', 'Pescador', 'Policia local', 'Turista'] },
      { id: 'teatre', nom: 'Teatre', rols: ['Actor', 'Director', 'Tècnic de llums', 'Espectador', 'Acomodador', 'Taquiller', 'Músic', 'Maquillador'] },
      { id: 'hotel', nom: 'Hotel', rols: ['Recepcionista', 'Client', 'Cambrera de pis', 'Director', 'Cuiner', 'Botones', 'Conserge', 'Vigilant'] },
      { id: 'vaixell', nom: 'Vaixell', rols: ['Capità', 'Mariner', 'Passatger', 'Cuiner', 'Mecànic', 'Animador', 'Guia', 'Neteja'] },
      { id: 'museu', nom: 'Museu', rols: ['Guia', 'Visitant', 'Vigilant', 'Restaurador', 'Taquiller', 'Director', 'Neteja', 'Conservador'] }
    ];

    const PACKAGES = [
      { id: 'classic', nom: 'Clàssic', color: { off: '#47375d', on: '#6a4d87' }, escenaris: ['aeroport', 'hospital', 'restaurant', 'tren'] },
      { id: 'oci', nom: 'Oci i festa', color: { off: '#5b3143', on: '#874b63' }, escenaris: ['discoteca', 'platja', 'camping', 'teatre'] },
      { id: 'quotidia', nom: 'Vida quotidiana', color: { off: '#5c4632', on: '#8a6948' }, escenaris: ['institut', 'hospital', 'tren', 'hotel'] },
      { id: 'viatge', nom: 'Viatges', color: { off: '#4f3d2f', on: '#7b5a41' }, escenaris: ['aeroport', 'vaixell', 'hotel', 'camping'] },
      { id: 'cultura', nom: 'Cultura', color: { off: '#635123', on: '#8d742c' }, escenaris: ['museu', 'teatre', 'institut', 'restaurant'] },
      { id: 'mixt', nom: 'Mixt', color: { off: '#55384c', on: '#7e5370' }, escenaris: ALL_SCENARIOS.map(s => s.id) }
    ];

    const state = {
      selectedPlayerCountMode: 3,
      players: ['', '', ''],
      spyCount: null,
      draftSpyCount: null,
      selectedPackageId: null,
      currentConfigPage: 1,
      currentRound: null,
      timerMinutes: 8,
      timerSeconds: 8 * 60,
      timerInterval: null,
      timerRunning: false,
      openScenarioId: null,
      currentRoleRevealIndex: null,
      roleModalOpen: false
    };

    const el = {
      setupScreen: document.getElementById('setupScreen'),
      configPage1: document.getElementById('configPage1'),
      configPage2: document.getElementById('configPage2'),
      configPage3: document.getElementById('configPage3'),
      playerCountButtons: document.getElementById('playerCountButtons'),
      playerInputs: document.getElementById('playerInputs'),
      addExtraPlayerBtn: document.getElementById('addExtraPlayerBtn'),
      spyPickerBtn: document.getElementById('spyPickerBtn'),
      toPage2Btn: document.getElementById('toPage2Btn'),
      backToPage1Btn: document.getElementById('backToPage1Btn'),
      packagesGrid: document.getElementById('packagesGrid'),
      toPage3Btn: document.getElementById('toPage3Btn'),
      summaryBox: document.getElementById('summaryBox'),
      backToPage2Btn: document.getElementById('backToPage2Btn'),
      startGameBtn: document.getElementById('startGameBtn'),
      timePickerWrap: document.getElementById('timePickerWrap'),
      timeDisplay: document.getElementById('timeDisplay'),
      timeMenuToggle: document.getElementById('timeMenuToggle'),
      timeMenu: document.getElementById('timeMenu'),
      revealScreen: document.getElementById('revealScreen'),
      playerRevealGrid: document.getElementById('playerRevealGrid'),
      revealReadyBtn: document.getElementById('revealReadyBtn'),
      roundScreen: document.getElementById('roundScreen'),
      timerDisplay: document.getElementById('timerDisplay'),
      timerToggleBtn: document.getElementById('timerToggleBtn'),
      revealSceneBtn: document.getElementById('revealSceneBtn'),
      sceneRevealBox: document.getElementById('sceneRevealBox'),
      newRoundBtn: document.getElementById('newRoundBtn'),
      backToSetupBtn: document.getElementById('backToSetupBtn'),
      spyModalBackdrop: document.getElementById('spyModalBackdrop'),
      spyGrid: document.getElementById('spyGrid'),
      closeSpyModalBtn: document.getElementById('closeSpyModalBtn'),
      scenariosModalBackdrop: document.getElementById('scenariosModalBackdrop'),
      scenariosModalTitle: document.getElementById('scenariosModalTitle'),
      scenariosModalList: document.getElementById('scenariosModalList'),
      closeScenariosModalBtn: document.getElementById('closeScenariosModalBtn'),
      playerRoleModalBackdrop: document.getElementById('playerRoleModalBackdrop'),
      closePlayerRoleBtn: document.getElementById('closePlayerRoleBtn'),
      playerRoleContent: document.getElementById('playerRoleContent')
    };

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function randomItem(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function scenarioById(id) {
      return ALL_SCENARIOS.find(s => s.id === id) || null;
    }

    function selectedPackage() {
      return PACKAGES.find(p => p.id === state.selectedPackageId) || null;
    }

    function setButtonEnabled(button, enabled) {
      button.disabled = !enabled;
      button.classList.toggle('enabled', enabled);
    }

    function setConfigPage(page) {
      state.currentConfigPage = page;
      el.configPage1.classList.toggle('hidden', page !== 1);
      el.configPage2.classList.toggle('hidden', page !== 2);
      el.configPage3.classList.toggle('hidden', page !== 3);
      if (page === 3) renderSummary();
      closeTimeMenu();
    }

    function setPlayerCountMode(value) {
      state.selectedPlayerCountMode = value;
      if (value === '10+') {
        while (state.players.length < 10) state.players.push('');
      } else {
        const count = Number(value);
        state.players = state.players.slice(0, count);
        while (state.players.length < count) state.players.push('');
      }
      if (state.spyCount !== null && state.spyCount >= state.players.length) {
        state.spyCount = null;
      }
      renderPlayerCountButtons();
      renderPlayerInputs();
      updateSpySummary();
      updatePage1NextButton();
    }

    function renderPlayerCountButtons() {
      el.playerCountButtons.innerHTML = '';
      const options = [3, 4, 5, 6, 7, 8, 9, '10+'];
      options.forEach(option => {
        const btn = document.createElement('button');
        btn.className = 'segment-btn';
        if (state.selectedPlayerCountMode === option) btn.classList.add('active');
        btn.textContent = option;
        btn.type = 'button';
        btn.addEventListener('click', () => setPlayerCountMode(option));
        el.playerCountButtons.appendChild(btn);
      });
      el.addExtraPlayerBtn.classList.toggle('hidden', state.selectedPlayerCountMode !== '10+');
    }

    function renderPlayerInputs() {
      el.playerInputs.innerHTML = '';
      state.players.forEach((name, index) => {
        const row = document.createElement('div');
        row.className = 'player-input-row';
        const input = document.createElement('input');
        input.type = 'text';
        input.maxLength = 30;
        input.placeholder = `Nom del jugador ${index + 1}`;
        input.value = name;
        input.addEventListener('input', (event) => {
          state.players[index] = event.target.value;
          updatePage1NextButton();
          if (state.currentConfigPage === 3) renderSummary();
        });
        row.appendChild(input);
        el.playerInputs.appendChild(row);
      });
    }

    function renderSpyGrid() {
      el.spyGrid.innerHTML = '';
      for (let n = 1; n <= 9; n += 1) {
        const btn = document.createElement('button');
        btn.className = 'square-choice';
        btn.type = 'button';
        if (state.draftSpyCount === n) btn.classList.add('active');
        btn.textContent = n;
        btn.addEventListener('click', () => {
          state.draftSpyCount = n;
          renderSpyGrid();
          updateSpyConfirmButton();
        });
        el.spyGrid.appendChild(btn);
      }
    }

    function updateSpySummary() {
      if (state.spyCount == null) {
        el.spyPickerBtn.textContent = 'Seleccionar nombre d\'espies';
        return;
      }
      el.spyPickerBtn.textContent = `Espies: ${state.spyCount}`;
    }

    function updateSpyConfirmButton() {
      setButtonEnabled(el.closeSpyModalBtn, state.draftSpyCount !== null);
    }

    function allVisiblePlayerNamesFilled() {
      return state.players.length >= 3 && state.players.every(name => name.trim() !== '');
    }

    function page1IsValid() {
      return allVisiblePlayerNamesFilled() && state.spyCount !== null && state.spyCount < state.players.length;
    }

    function updatePage1NextButton() {
      setButtonEnabled(el.toPage2Btn, page1IsValid());
    }

    function renderPackages() {
      el.packagesGrid.innerHTML = '';
      PACKAGES.forEach(pkg => {
        const card = document.createElement('div');
        card.className = 'package-card';
        const selected = state.selectedPackageId === pkg.id;
        if (selected) card.classList.add('selected');
        card.style.background = selected ? pkg.color.on : pkg.color.off;
        card.addEventListener('click', () => {
          state.selectedPackageId = pkg.id;
          renderPackages();
          updatePage2NextButton();
          if (state.currentConfigPage === 3) renderSummary();
        });

        const top = document.createElement('div');
        top.className = 'package-top';

        const textWrap = document.createElement('div');
        textWrap.innerHTML = `
          <div class="package-title">${escapeHtml(pkg.nom)}</div>
          <div class="small" style="color: rgba(242,244,255,0.82)">Té ${pkg.escenaris.length} situacions.</div>
        `;

        const eyeBtn = document.createElement('button');
        eyeBtn.className = 'eye-btn';
        eyeBtn.type = 'button';
        eyeBtn.setAttribute('aria-label', `Veure situacions del paquet ${pkg.nom}`);
        eyeBtn.textContent = '👁';
        eyeBtn.addEventListener('click', (event) => {
          event.stopPropagation();
          openScenariosModal(pkg.id);
        });

        top.appendChild(textWrap);
        top.appendChild(eyeBtn);
        card.appendChild(top);
        el.packagesGrid.appendChild(card);
      });
    }

    function updatePage2NextButton() {
      setButtonEnabled(el.toPage3Btn, Boolean(state.selectedPackageId));
    }

    function openScenariosModal(packageId) {
      const pkg = PACKAGES.find(p => p.id === packageId);
      if (!pkg) return;
      state.openScenarioId = null;
      el.scenariosModalTitle.textContent = `Situacions del paquet ${pkg.nom}`;
      renderScenariosModal(pkg);
      el.scenariosModalBackdrop.classList.remove('hidden');
    }

    function renderScenariosModal(pkg) {
      el.scenariosModalList.innerHTML = '';
      pkg.escenaris.map(scenarioById).filter(Boolean).forEach(scenario => {
        const item = document.createElement('div');
        item.className = 'scenario-expand-item';

        const head = document.createElement('button');
        head.className = 'scenario-expand-head';
        head.type = 'button';
        head.innerHTML = `
          <span>${escapeHtml(scenario.nom)}</span>
          <span class="small muted">${state.openScenarioId === scenario.id ? '−' : '+'}</span>
        `;
        head.addEventListener('click', () => {
          state.openScenarioId = state.openScenarioId === scenario.id ? null : scenario.id;
          renderScenariosModal(pkg);
        });
        item.appendChild(head);

        if (state.openScenarioId === scenario.id) {
          const roles = document.createElement('div');
          roles.className = 'scenario-expand-roles';
          roles.innerHTML = scenario.rols.map(role => `<div>${escapeHtml(role)}</div>`).join('');
          item.appendChild(roles);
        }

        el.scenariosModalList.appendChild(item);
      });
    }

    function renderSummary() {
      const pkg = selectedPackage();
      const scenarioNames = pkg ? pkg.escenaris.map(scenarioById).filter(Boolean).map(s => `<div>${escapeHtml(s.nom)}</div>`).join('') : '<div>No hi ha paquet seleccionat.</div>';
      const playersList = state.players.map(name => `<div>${escapeHtml(name.trim())}</div>`).join('');
      el.summaryBox.innerHTML = `
        <div class="summary-section">
          <strong>Jugadors</strong>
          <div class="plain-list">${playersList}</div>
        </div>
        <div class="summary-section">
          <strong>Espies</strong>
          <div class="plain-list"><div>${state.spyCount ?? 'No seleccionat'}</div></div>
        </div>
        <div class="summary-section">
          <strong>Paquet</strong>
          <div class="plain-list"><div>${pkg ? escapeHtml(pkg.nom) : 'No seleccionat'}</div></div>
        </div>
        <div class="summary-section">
          <strong>Situacions del paquet</strong>
          <div class="plain-list">${scenarioNames}</div>
        </div>
      `;
    }

    function renderTimeMenu() {
      el.timeDisplay.textContent = `${state.timerMinutes} ${state.timerMinutes === 1 ? 'minut' : 'minuts'}`;
      el.timeMenu.innerHTML = '';
      for (let minute = 5; minute <= 15; minute += 1) {
        const btn = document.createElement('button');
        btn.className = 'time-option';
        btn.type = 'button';
        if (minute === state.timerMinutes) btn.classList.add('active');
        btn.textContent = `${minute} ${minute === 1 ? 'minut' : 'minuts'}`;
        btn.addEventListener('click', () => {
          state.timerMinutes = minute;
          renderTimeMenu();
          closeTimeMenu();
        });
        el.timeMenu.appendChild(btn);
      }
    }

    function openTimeMenu() {
      el.timeMenu.classList.remove('hidden');
    }

    function closeTimeMenu() {
      el.timeMenu.classList.add('hidden');
    }

    function validateForRoundStart() {
      if (!page1IsValid()) {
        alert('Revisa els jugadors i el nombre d\'espies.');
        return false;
      }
      if (!state.selectedPackageId) {
        alert('Has d\'escollir un paquet de situacions.');
        return false;
      }
      const pkg = selectedPackage();
      const neededRoles = state.players.length - state.spyCount;
      const validScenarios = pkg.escenaris.map(scenarioById).filter(s => s && s.rols.length >= neededRoles);
      if (validScenarios.length === 0) {
        alert('Aquest paquet no té cap situació amb prou rols per a aquesta partida.');
        return false;
      }
      return true;
    }

    function createRound() {
      const pkg = selectedPackage();
      const neededRoles = state.players.length - state.spyCount;
      const candidates = pkg.escenaris.map(scenarioById).filter(s => s && s.rols.length >= neededRoles);
      const scenario = randomItem(candidates);
      const roles = shuffle(scenario.rols).slice(0, neededRoles);
      const playerIndexes = shuffle(state.players.map((_, i) => i));
      const spyIndexes = playerIndexes.slice(0, state.spyCount);
      const assignments = state.players.map((name, index) => ({
        nom: name.trim(),
        esEspia: spyIndexes.includes(index),
        rol: null,
        vist: false
      }));

      let roleIndex = 0;
      assignments.forEach(player => {
        if (!player.esEspia) {
          player.rol = roles[roleIndex];
          roleIndex += 1;
        }
      });

      state.currentRound = {
        packageId: pkg.id,
        packageName: pkg.nom,
        scenarioId: scenario.id,
        scenarioName: scenario.nom,
        assignments
      };
      state.currentRoleRevealIndex = null;
      state.roleModalOpen = false;
      closePlayerRoleModal();
    }

    function showRevealScreen() {
      clearTimer();
      el.setupScreen.classList.add('hidden');
      el.roundScreen.classList.add('hidden');
      el.revealScreen.classList.remove('hidden');
      renderPlayerRevealGrid();
    }

    function renderPlayerRevealGrid() {
      if (!state.currentRound) return;
      el.playerRevealGrid.innerHTML = '';
      state.currentRound.assignments.forEach((player, index) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = `player-reveal-btn ${player.vist ? 'done' : 'pending'}`;
        btn.textContent = player.nom;
        btn.disabled = player.vist;
        btn.addEventListener('click', () => openPlayerRoleModal(index));
        el.playerRevealGrid.appendChild(btn);
      });
      const allViewed = state.currentRound.assignments.every(player => player.vist);
      setButtonEnabled(el.revealReadyBtn, allViewed);
    }

    function openPlayerRoleModal(index) {
      if (!state.currentRound) return;
      const player = state.currentRound.assignments[index];
      if (!player || player.vist) return;
      state.currentRoleRevealIndex = index;
      state.roleModalOpen = true;
      if (player.esEspia) {
        el.playerRoleContent.innerHTML = `<div class="spy-big">ESPÍA</div>`;
      } else {
        el.playerRoleContent.innerHTML = `
          <div class="scenario-big">${escapeHtml(state.currentRound.scenarioName)}</div>
          <div class="role-line">Rol: ${escapeHtml(player.rol)}</div>
        `;
      }
      el.playerRoleModalBackdrop.classList.remove('hidden');
    }

    function closePlayerRoleModal() {
      if (!state.roleModalOpen || state.currentRoleRevealIndex == null || !state.currentRound) {
        el.playerRoleModalBackdrop.classList.add('hidden');
        state.roleModalOpen = false;
        state.currentRoleRevealIndex = null;
        return;
      }
      const player = state.currentRound.assignments[state.currentRoleRevealIndex];
      if (player) player.vist = true;
      el.playerRoleModalBackdrop.classList.add('hidden');
      state.roleModalOpen = false;
      state.currentRoleRevealIndex = null;
      renderPlayerRevealGrid();
    }

    function showRoundScreen() {
      el.setupScreen.classList.add('hidden');
      el.revealScreen.classList.add('hidden');
      el.roundScreen.classList.remove('hidden');
      el.sceneRevealBox.classList.add('hidden');
      el.sceneRevealBox.textContent = '';
    }

    function formatTime(totalSeconds) {
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }

    function updateTimerUI() {
      el.timerDisplay.textContent = formatTime(state.timerSeconds);
      el.timerToggleBtn.textContent = state.timerRunning ? 'Pausar' : 'Reprendre';
    }

    function clearTimer() {
      if (state.timerInterval) {
        clearInterval(state.timerInterval);
        state.timerInterval = null;
      }
      state.timerRunning = false;
    }

    function startRoundTimer() {
      clearTimer();
      state.timerSeconds = state.timerMinutes * 60;
      showRoundScreen();
      state.timerRunning = true;
      updateTimerUI();
      state.timerInterval = setInterval(() => {
        if (!state.timerRunning) return;
        state.timerSeconds -= 1;
        updateTimerUI();
        if (state.timerSeconds <= 0) {
          clearTimer();
          state.timerSeconds = 0;
          updateTimerUI();
          alert("S'ha acabat el temps!");
        }
      }, 1000);
    }

    function toggleTimer() {
      state.timerRunning = !state.timerRunning;
      updateTimerUI();
    }

    function revealScenario() {
      if (!state.currentRound) return;
      el.sceneRevealBox.classList.remove('hidden');
      el.sceneRevealBox.innerHTML = `<strong>Situació de la ronda:</strong> ${escapeHtml(state.currentRound.scenarioName)}`;
    }

    function newRound() {
      if (!validateForRoundStart()) return;
      createRound();
      showRevealScreen();
    }

    function backToSetup() {
      clearTimer();
      closePlayerRoleModal();
      el.setupScreen.classList.remove('hidden');
      el.revealScreen.classList.add('hidden');
      el.roundScreen.classList.add('hidden');
      setConfigPage(1);
    }

    el.addExtraPlayerBtn.addEventListener('click', () => {
      state.players.push('');
      renderPlayerInputs();
      updatePage1NextButton();
    });

    el.spyPickerBtn.addEventListener('click', () => {
      state.draftSpyCount = state.spyCount;
      renderSpyGrid();
      updateSpyConfirmButton();
      el.spyModalBackdrop.classList.remove('hidden');
    });

    el.closeSpyModalBtn.addEventListener('click', () => {
      if (el.closeSpyModalBtn.disabled) return;
      if (state.draftSpyCount !== null && state.draftSpyCount < state.players.length) {
        state.spyCount = state.draftSpyCount;
        updateSpySummary();
        updatePage1NextButton();
        el.spyModalBackdrop.classList.add('hidden');
      } else {
        alert('El nombre d\'espies ha de ser inferior al nombre de jugadors.');
      }
    });

    el.backToPage1Btn.addEventListener('click', () => setConfigPage(1));
    el.toPage2Btn.addEventListener('click', () => {
      if (!page1IsValid()) return;
      setConfigPage(2);
    });

    el.toPage3Btn.addEventListener('click', () => {
      if (!state.selectedPackageId) return;
      setConfigPage(3);
    });

    el.backToPage2Btn.addEventListener('click', () => setConfigPage(2));

    el.startGameBtn.addEventListener('click', () => {
      if (!validateForRoundStart()) return;
      createRound();
      showRevealScreen();
    });

    el.revealReadyBtn.addEventListener('click', () => {
      if (!state.currentRound) return;
      if (!state.currentRound.assignments.every(player => player.vist)) return;
      startRoundTimer();
    });

    el.timerToggleBtn.addEventListener('click', toggleTimer);
    el.revealSceneBtn.addEventListener('click', revealScenario);
    el.newRoundBtn.addEventListener('click', newRound);
    el.backToSetupBtn.addEventListener('click', backToSetup);
    el.closeScenariosModalBtn.addEventListener('click', () => {
      el.scenariosModalBackdrop.classList.add('hidden');
    });
    el.closePlayerRoleBtn.addEventListener('click', closePlayerRoleModal);

    el.timeMenuToggle.addEventListener('click', (event) => {
      event.stopPropagation();
      el.timeMenu.classList.toggle('hidden');
    });

    document.addEventListener('click', (event) => {
      if (!el.timePickerWrap.contains(event.target)) closeTimeMenu();
    });

    renderPlayerCountButtons();
    renderPlayerInputs();
    renderSpyGrid();
    updateSpySummary();
    updateSpyConfirmButton();
    updatePage1NextButton();
    renderPackages();
    updatePage2NextButton();
    renderSummary();
    renderTimeMenu();
    updateTimerUI();
    setConfigPage(1);
  </script>
</body>
</html>
